# ryo-osc v0.1.0
# https://github.com/Xightify/ryo-osc
# https://github.com/Xightify/mpv-config
# License: LGPL v2.1

# Put this file in mpv's script-opts folder as: script-opts/ryo-osc.conf
# Boolean values use yes/no. Strings do not need quotes here.

# === Screens and visibility ===
#1 = independent top/bottom zones, 2 = mouse movement shows both (recommended: hidetimeout >= 1000)
hover_mode=1
# show mpv logo when idle
idlescreen=yes
# show mpv logo when no video
audioonlyscreen=no
# show OSC on start of every file
osc_on_start=no
# show OSC when seeking
osc_on_seek=no
# disable OSC hide timeout when paused
keeponpause=no
# time (in ms) before OSC hides if no mouse movement
hidetimeout=100
# whether to enable fade-in effect
fadein=yes
# fade-out duration (in ms), set to 0 for no fade
fadeduration=200
# minimum mouse movement (in pixels) required to show OSC
minmousemove=0
# only used at init to set visibility_mode(...)
visibility=auto
# visibility modes to cycle through
visibility_modes=never_auto_always
# disable Santa hat in December
greenandgrumpy=no

# === Title and time text ===
# title above seekbar format: "${media-title}" or "${filename}"
title=${metadata/by-key/title:${filename/no-ext}}
# show total time instead of remaining time
timecurrent=no
# show timecodes with milliseconds
timems=no

# === Window/top bar ===
# show OSC window top bar: "auto", "yes", or "no" (borderless/fullscreen)
window_top_bar=yes
# show window title in borderless/fullscreen mode
window_title=no

# === Buttons ===
# speed button mode: always = always show, yes = show when speed is not 1x, no = disabled
speed_button=yes
# speed change for left/right click and mouse wheel
speed_step=0.1
# minimum playback speed from speed button
speed_min=0.1
# maximum playback speed from speed button
speed_max=2.0
# show audio track button (only if more than 1 audio track exists)
audio_button=yes
# always show audio track button when audio exists
audio_button_always_visible=yes
# hide subtitle button when no subtitle tracks exist
hide_subtitle_button_when_unavailable=yes

# === Download button ===
# show download button for YouTube URLs opened through ytdl/yt-dlp
download_button=yes
# hide download button after a successful download
hide_download_button_after_download=yes
# default download directory for videos (https://mpv.io/manual/master/#paths)
download_path=~/Videos/mpv-downloads/

# === Seekbar and progress ===
# show seek range overlay
seekrange=yes
# always show a small progress line at the bottom of the screen
persistent_progress=no
# show cached buffer status in the persistent progress line
persistent_buffer=no
# accent color for the progress bar
accent_color=#FFFFFF

# === Redraw timing ===
# minimum interval between OSC redraws (in seconds)
tick_delay=0.0166666666666667
# use display FPS as the minimum redraw interval
tick_delay_follow_display_fps=no

# === Mouse Commands ===
# Mouse commands: title
title_mbtn_left_command=script-binding stats/display-page-5
title_mbtn_mid_command=show-text ${path}
title_mbtn_right_command=script-binding select/select-watch-history

# Mouse commands: chapter title
chapter_title_mbtn_left_command=script-binding select/select-chapter
chapter_title_mbtn_right_command=

# Mouse commands: play/pause
play_pause_mbtn_mid_command=cycle-values loop-playlist inf no
play_pause_mbtn_right_command=script-binding select/select-playlist

# Mouse commands: playlist previous
playlist_prev_mbtn_left_command=playlist-prev
playlist_prev_mbtn_right_command=

# Mouse commands: playlist next
playlist_next_mbtn_left_command=playlist-next
playlist_next_mbtn_right_command=

# Mouse commands: volume button
vol_ctrl_mbtn_left_command=no-osd cycle mute
vol_ctrl_wheel_down_command=no-osd add volume -5
vol_ctrl_wheel_up_command=no-osd add volume 5

# Mouse commands: volume bar
volumebar_wheel_down_command=osd-msg add volume -5
volumebar_wheel_up_command=osd-msg add volume 5

# Mouse commands: menu
menu_mbtn_left_command=script-binding select/menu

# Mouse commands: audio track
audio_track_mbtn_left_command=script-binding select/select-aid
audio_track_mbtn_right_command=set audio no
audio_track_wheel_down_command=cycle audio
audio_track_wheel_up_command=cycle audio down

# Mouse commands: subtitle track
sub_track_mbtn_left_command=script-binding select/select-sid
sub_track_mbtn_mid_command=cycle sub-visibility
sub_track_mbtn_right_command=set sub no
sub_track_wheel_down_command=cycle sub
sub_track_wheel_up_command=cycle sub down

# Mouse commands: fullscreen
fullscreen_mbtn_left_command=cycle fullscreen

# Mouse commands: window controls
close_mbtn_left_command=quit
maximize_mbtn_left_command=cycle ${?fullscreen==yes:fullscreen}${!fullscreen==yes:window-maximized}
minimize_mbtn_left_command=cycle window-minimized
