# ─── chapters ────────────────────────────────────
e no-osd add chapter 1 ; show-text "${chapter-metadata/by-key/title}"
E no-osd add chapter 1 ; show-text "${chapter-metadata/by-key/title}"
q no-osd add chapter -1 ; show-text "${chapter-metadata/by-key/title}"
Q no-osd add chapter -1 ; show-text "${chapter-metadata/by-key/title}"



# ─── seek ────────────────────────────────────
a seek -30
A seek -30
d seek 30
D seek 30
LEFT ignore     # lang-seek.lua
RIGHT ignore    # lang-seek.lua
WHEEL_LEFT seek -2 exact
WHEEL_RIGHT seek  2 exact
CTRL+LEFT seek -5 exact
CTRL+RIGHT seek 5 exact
Shift+BS revert-seek                   # undo the previous (or marked) seek
Shift+Ctrl+BS revert-seek mark         # mark the position for revert-seek



# ─── volume ────────────────────────────────────
UP add volume 5
DOWN add volume -5
WHEEL_UP add volume  1
WHEEL_DOWN add volume -1
m cycle mute
M cycle mute



# ─── playlist ────────────────────────────────────
b playlist-prev
B playlist-prev
n playlist-next
N playlist-next



# ─── speed ────────────────────────────────────
[ add speed -0.1
] add speed 0.1
\ set speed 1



# ─── cycle ────────────────────────────────────
f cycle fullscreen
F cycle fullscreen
j cycle sub
J cycle sub
k cycle audio
K cycle audio



# ─── loop / shuffle ────────────────────────────────────
l cycle-values loop-file inf no
L cycle-values loop-file inf no
F1 cycle-values loop-file inf no; show-text "Loop file: ${?loop-file==no:no}${?loop-file==inf:yes}"                                                      # loops file
F2 cycle-values loop-playlist inf no; show-text "Loop playlist: ${?loop-playlist==no:no}${?loop-playlist==inf:yes}"                                      # loops playlist
F3 playlist-shuffle; show-text "Shuffle"                                                                                                                 # shuffle
F4 ab-loop                                                                                                                                               # set/clear A-B loop points



# ─── misc ────────────────────────────────────
i screenshot video
I screenshot
o show-progress
O no-osd cycle-values osd-level 3 1
p no-osd cycle ontop
P no-osd cycle ontop
t cycle deinterlace
T cycle deinterlace
x show-text ${playlist}
X show-text ${playlist}
z script-binding stats/display-stats-toggle
Z script-binding stats/display-stats-toggle



# ─── symbols ────────────────────────────────────
. frame-step
, frame-back-step
= no-osd cycle-values sub-ass-override "force" "no"
` script-binding commands/open
? script-binding stats/display-page-4-toggle



# ─── number keys ────────────────────────────────────
1 ignore        # deband-cycle.lua
2 cycle deband
3 no-osd add audio-delay -0.1; show-text "Audio delay: ${audio-delay}"
4 no-osd add audio-delay 0.1; show-text "Audio delay: ${audio-delay}"
5 add sub-delay -0.1
6 add sub-delay  0.1
7 add sub-scale -0.05
8 add sub-scale  0.05
9 add sub-pos -1
0 add sub-pos +1



# ─── mouse buttons ────────────────────────────────────
MBTN_LEFT     ignore
MBTN_LEFT_DBL cycle fullscreen
MBTN_RIGHT script-binding select/context-menu
MBTN_BACK seek -2 exact
MBTN_FORWARD seek 2 exact 



# ─── ctrl ────────────────────────────────────
ctrl+w quit
ctrl+W quit
ctrl+q quit-watch-later
ctrl+Q quit-watch-later



# ─── Function Keys ────────────────────────────────────
F1 cycle-values loop-file inf no; show-text "Loop file: ${?loop-file==no:no}${?loop-file==inf:yes}"                                                      # loops file
F2 cycle-values loop-playlist inf no; show-text "Loop playlist: ${?loop-playlist==no:no}${?loop-playlist==inf:yes}"                                      # loops playlist
F3 playlist-shuffle; show-text "Shuffle"                                                                                                                 # shuffle
F4 ab-loop                                                                                                                                               # set/clear A-B loop points
F5 ignore
F6 ignore
F7 ignore
F8 ignore
F9 ignore
F10 ignore
F11 ignore
F12 ignore



